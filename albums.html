            <img class="lightbox-img-lateral" id="lightbox-img-proxima" src="" alt="">
        </div>
        <button class="lightbox-seta lightbox-proxima" id="lightbox-proxima" aria-label="Próxima foto">&#10095;</button>
    </div>

    <div class="lightbox-info-fundo" id="lightbox-info-fundo">
        <dl class="lightbox-info-painel" id="lightbox-info-painel">
            <button class="lightbox-info-fechar" id="lightbox-info-fechar" aria-label="Fechar informações">&times;</button>
            <div class="lightbox-info-item" data-campo="data">
                <dt>Data</dt>
                <dd id="info-data"></dd>
            </div>
            <div class="lightbox-info-item" data-campo="camera">
                <dt>Câmera</dt>
                <dd id="info-camera"></dd>
            </div>
            <div class="lightbox-info-item" data-campo="lente">
                <dt>Lente</dt>
                <dd id="info-lente"></dd>
            </div>
            <div class="lightbox-info-item" data-campo="iso">
                <dt>ISO</dt>
                <dd id="info-iso"></dd>
            </div>
            <div class="lightbox-info-item" data-campo="foco">
                <dt>Distância focal</dt>
                <dd id="info-foco"></dd>
            </div>
            <div class="lightbox-info-item" data-campo="obturador">
                <dt>Obturador</dt>
                <dd id="info-obturador"></dd>
            </div>
        </dl>
    </div>

    <script src="script.js"></script>

    <footer class="rodape">
        <img class="footer_logo" src="./img_Logo/logo_transparente.png" alt="logo aniz footer">
